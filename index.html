<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>导航</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#f5f6f7;
padding:30px;
}

.links{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:16px;
}

.card{
background:white;
padding:14px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.card a{
display:flex;
text-decoration:none;
color:#333;
}

.icon img{
width:30px;
margin-right:12px;
}

.title{
font-weight:600;
}

.desc{
font-size:13px;
color:#999;
}

</style>

</head>

<body>

<h2>导航</h2>

<div class="links" id="nav"></div>

<script>

let data=[]

fetch("sites.json")
.then(res=>res.json())
.then(res=>{
data=res
render()
})

function render(){

const nav=document.getElementById("nav")

data.forEach(site=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`
<a href="${site.url}" target="_blank">

<div class="icon">
<img src="https://logo.clearbit.com/${new URL(site.url).hostname}">
</div>

<div>
<div class="title">${site.name}</div>
<div class="desc">${site.desc}</div>
</div>

</a>
`

nav.appendChild(div)

})

}

</script>

</body>
</html>
